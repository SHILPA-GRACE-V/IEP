<div class="filter-panel">
  <!-- header -->
  <div class="panel-header">
    <h4>Filter Activities</h4>

    <div class="panel-actions">
      <button class="link-btn" (click)="clearFilters()">Clear Filter</button>
      <button class="collapse-btn" (click)="toggleExpanded()">
        <span [class.rotated]="!isExpanded()">▾</span>
      </button>
    </div>
  </div>

  <!-- filter controls -->
  <div class="controls-grid" *ngIf="isExpanded()">

    <!-- View As -->
    <div class="ctrl">
      <label>View As</label>
      <kendo-multiselect
        [data]="viewAsList"
        [value]="viewAs()"
        [checkboxes]="true"        tagMode="single"
        [tagMapper]="commaLabel"
        (valueChange)="viewAs.set($event); onAnyChange()">
        <ng-template kendoMultiSelectCheckAll>All</ng-template>
      </kendo-multiselect>
    </div>

    <!-- Functions -->
    <div class="ctrl">
      <label>Functions</label>
      <kendo-multiselect
        [data]="functionsList"
        [value]="functions()"
        [checkboxes]="true"        tagMode="single"
        [tagMapper]="commaLabel"
        (valueChange)="functions.set($event); onAnyChange()">
        <ng-template kendoMultiSelectCheckAll>All</ng-template>
      </kendo-multiselect>
    </div>

    <!-- Document Type -->
    <div class="ctrl">
      <label>Document Type</label>
      <kendo-multiselect
        [data]="documentTypeList"
        [value]="documentType()"
        [checkboxes]="true"        tagMode="single"
        [tagMapper]="commaLabel"
        (valueChange)="documentType.set($event); onAnyChange()">
        <ng-template kendoMultiSelectCheckAll>All</ng-template>
      </kendo-multiselect>
    </div>

    <!-- Activity Status -->
    <div class="ctrl">
      <label>Activity Status</label>
      <kendo-multiselect
        [data]="statusList"
        [value]="status()"
        [checkboxes]="true"        tagMode="single"
        [tagMapper]="commaLabel"
        (valueChange)="status.set($event); onAnyChange()">
        <ng-template kendoMultiSelectCheckAll>All</ng-template>
      </kendo-multiselect>
    </div>

    <!-- Activity Type -->
    <div class="ctrl">
      <label>Activity Type</label>
      <kendo-multiselect
        [data]="activityTypeList"
        [value]="activityType()"
        [checkboxes]="true"        tagMode="single"
        [tagMapper]="commaLabel"
        (valueChange)="activityType.set($event); onAnyChange()">
        <ng-template kendoMultiSelectCheckAll>All</ng-template>
      </kendo-multiselect>
    </div>

    <!-- Finish By -->
    <div class="ctrl">
      <label>Finish By</label>
      <kendo-multiselect
        [data]="finishByList"
        [value]="finishBy()"
        [checkboxes]="true"        tagMode="single"
        [tagMapper]="commaLabel"
        (valueChange)="finishBy.set($event); onAnyChange()">
        <ng-template kendoMultiSelectCheckAll>All</ng-template>
      </kendo-multiselect>
    </div>

    <!-- Date Type -->
    <div class="ctrl">
      <label>Date Type</label>
      <kendo-multiselect
        [data]="dateTypeList"
        [value]="dateType()"
        [checkboxes]="true"        tagMode="single"
        [tagMapper]="commaLabel"
        (valueChange)="dateType.set($event); onAnyChange()">
        <ng-template kendoMultiSelectCheckAll>All</ng-template>
      </kendo-multiselect>
    </div>
  </div>

  <!-- chips & sprint bar -->
  <div class="doc-summary-bar">
    <div class="doc-tags">
      <span class="doc-tag green">Total Documents (1321)</span>
      <span class="doc-tag gray">Backlogs (16)</span>
      <span class="doc-tag gray">Forecast (199)</span>
      <span class="doc-tag gray">Not Acknowledged (3)</span>
      <span class="doc-tag gray">Step (5)</span>
      <span class="doc-tag gray">Rulestream (3)</span>
    </div>

    <div class="sprint-bar">
      <button class="sprint-prev">‹</button>

      <button class="sprint-week today">
        <span>Today</span><small>1 out of 1 are not completed</small>
      </button>
      <button class="sprint-week">
        <span>FW 6 (This Week)</span><small>6 / 15 not completed</small>
      </button>
      <button class="sprint-week">
        <span>FW 7 2025 (Next Week)</span><small>4 / 8 not completed</small>
      </button>
      <button class="sprint-week">
        <span>FW 8 2025</span><small>4 / 8 not completed</small>
      </button>

      <button class="sprint-next">›</button>
    </div>
  </div>
</div>
