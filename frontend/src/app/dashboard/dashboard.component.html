<div class="dashboard-wrapper">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-left">
      <img src="../../assets/Logo-Dashboard.png" alt="IEP Logo" class="logo" />
      <div class="app-info">
        <h1>IEP</h1>
        <p>Integrated Engineering Platform</p>
      </div>
    </div>

    <div class="top-right">
      <span class="nav-item" (click)="openPopup('request')">My Request</span>
      <span class="nav-item" (click)="openPopup('ticket')">Support Ticket</span>
      <span class="icon" (click)="openPopup('message')">
  <img src="../../assets/comment.png" alt="Message Icon" />
</span>
<span class="icon" (click)="openPopup('notification')">
  <img src="../../assets/active.png" alt="Notification Icon" />
</span>
<span class="icon" (click)="openPopup('help')">
  <img src="../../assets/question.png" alt="Help Icon" />
</span>


      <!-- Profile -->
      <div class="profile-icon" (click)="toggleProfileMenu()">
        <img src="../../assets/profile.jpg" alt="Profile" />
        <div class="dropdown" *ngIf="profileMenuVisible">
          <div (click)="openPopup('profile')">My Profile</div>
          <div (click)="logout()">Logout</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="dashboard-body">
    <aside class="sidebar">
      <app-contract-tree
  [contractsData]="contractsData()"
  (selectedProjects)="onProjectSelectionChange($event)">
</app-contract-tree>

    </aside>

    <main class="main-content">
      <app-operation-header></app-operation-header>

      <kendo-tabstrip (tabSelect)="onTabSelect($event)">
  <kendo-tabstrip-tab
    *ngFor="let tab of tabs"
    [title]="tab">
    <ng-template kendoTabContent>
      <app-filter-activities (filtersChanged)="handleFilterChange($event)"></app-filter-activities>
      <!-- Document Summary + Sprint Timeline -->
<div class="document-summary-bar">
  <div class="doc-tags">
    <span class="doc-tag green">Total Documents (1321)</span>
    <span class="doc-tag gray">Backlogs (16)</span>
    <span class="doc-tag gray">Forecast (199)</span>
    <span class="doc-tag gray">Not Acknowledged (3)</span>
    <span class="doc-tag gray">Step (5)</span>
    <span class="doc-tag gray">Rulestream (3)</span>
  </div>

  <div class="sprint-bar">
    <button class="sprint-week today">
      <span>Today</span>
      <small>1 out of 1 are not completed</small>
    </button>
    <button class="sprint-week">
      <span>FW 6, 2025 (This Week)</span>
      <small>6 out of 15 are not completed</small>
    </button>
    <button class="sprint-week">
      <span>FW 7, 2025 (Next Week)</span>
      <small>4 out of 8 are not completed</small>
    </button>
    <button class="sprint-week">
      <span>FW 8, 2025</span>
      <small>4 out of 8 are not completed</small>
    </button>
    <button class="sprint-next">></button>
  </div>
</div>

      <app-activity-grid [data]="filteredData()"></app-activity-grid>
    </ng-template>
  </kendo-tabstrip-tab>
</kendo-tabstrip>

    </main>
  </div>
</div>

<!-- Popup Modal -->
<div class="popup-overlay" *ngIf="popup">
  <div class="popup-card">
    <button class="close-btn" (click)="closePopup()">✖</button>
    <h2>{{ popup | titlecase }}</h2>
    <p>This is a popup window for {{ popup }}.</p>
  </div>
</div>
